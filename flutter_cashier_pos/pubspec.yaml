name: cashier_pos
description: Car Showroom POS System for Cashier Role - Modern tablet-optimized interface
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Design
  cupertino_icons: ^1.0.2
  material_color_utilities: ^0.5.0
  flutter_svg: ^2.0.7
  
  # State Management
  provider: ^6.0.5
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.2
  
  # Storage & Cache
  shared_preferences: ^2.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Image & Media
  cached_network_image: ^3.2.3
  image_picker: ^1.0.2
  photo_view: ^0.14.0
  
  # Utils
  intl: ^0.18.1
  uuid: ^3.0.7
  path_provider: ^2.1.0
  
  # Scanner
  qr_code_scanner: ^1.0.1
  
  # PDF & Printing
  pdf: ^3.10.4
  printing: ^5.11.0
  
  # Navigation
  go_router: ^10.1.2
  
  # Form & Validation
  reactive_forms: ^16.1.1
  
  # Responsive Design
  responsive_framework: ^1.1.1
  flutter_screenutil: ^5.8.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/